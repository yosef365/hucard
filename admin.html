<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>HuCard Admin Login</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

<style>

body{
margin:0;
font-family:Inter,sans-serif;
background:#f4f6fb;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-card{

width:380px;
background:#fff;
padding:40px;
border-radius:15px;
box-shadow:0 15px 40px rgba(0,0,0,.08);

}

.login-card h1{

margin:0;
text-align:center;
margin-bottom:10px;

}

.login-card p{

text-align:center;
color:#666;
margin-bottom:25px;

}

.login-card input{

width:100%;
padding:14px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:8px;
font-size:15px;
box-sizing:border-box;

}

.login-card button{

width:100%;
padding:14px;
background:#2563eb;
border:none;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;

}

.login-card button:hover{

background:#1d4ed8;

}

#message{

margin-top:15px;
color:red;
text-align:center;

}

</style>

</head>

<body>

<div class="login-card">

<h1>HuCard</h1>

<p>Administrator Login</p>

<input
id="email"
type="email"
placeholder="Email">

<input
id="password"
type="password"
placeholder="Password">

<button id="loginBtn">

Login

</button>

<p id="message"></p>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/supabase.js"></script>

<script src="js/auth.js"></script>

</body>

</html>
