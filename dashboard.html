<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>HuCard Dashboard</title>

    <!-- Google Font -->

<body>

<!-- =========================

========================= -->

<!-- =========================

========================= -->

<div class="dashboard-container">

<!-- =========================

========================= -->

<aside class="sidebar">

    <!-- Logo -->

    <div class="logo">

        <i class="fa-solid fa-id-card"></i>

        <span>HuCard</span>

    </div>

    <!-- Navigation -->

    <nav class="sidebar-menu">

        <a href="#" class="active">

            <i class="fa-solid fa-house"></i>

            Dashboard

        </a>

        <a href="#">

            <i class="fa-solid fa-address-card"></i>

            Profiles

        </a>

        <a href="#">

            <i class="fa-solid fa-building"></i>

            Companies

        </a>

        <a href="#">

            <i class="fa-solid fa-chart-line"></i>

            Analytics

        </a>

        <a href="#">

            <i class="fa-solid fa-palette"></i>

            Themes

        </a>

        <a href="#">

            <i class="fa-solid fa-database"></i>

        </a>

        <a href="#">

    <!-- Sidebar Footer -->

    <div class="sidebar-footer">

</aside>

<!-- =========================
     Main Content
========================= -->

<main class="main-content">

<!-- =========================
     Top Header
========================= -->

<header class="top-header">

    <div class="header-left">

        <h1>

            Dashboard

        </h1>

        <p>

            Welcome back,

            <strong id="adminName">

                Administrator

            </strong>

        </p>

    </div>

    <div class="header-right">

        <!-- Search -->

        <div class="header-search">

            <i class="fa-solid fa-search"></i>

            <input
                type="text"
                id="globalSearch"
                placeholder="Search profiles...">

        </div>

        <!-- Notification -->

        <button class="icon-btn">

            <i class="fa-regular fa-bell"></i>

        </button>

        <!-- User -->

        <button class="icon-btn">

            <i class="fa-solid fa-user"></i>

        </button>

    </div>

</header>

<!-- =========================
     Statistics
========================= -->

<section class="stats-grid">

<div class="stat-card">

    <div>

        <small>Total Profiles</small>

        <h2 id="totalProfiles">

            0

        </h2>

    </div>

    <i class="fa-solid fa-address-card"></i>

</div>

<div class="stat-card">

    <div>

        <small>Total Views</small>

        <h2 id="totalViews">

            0

        </h2>

    </div>

    <i class="fa-solid fa-eye"></i>

</div>

<div class="stat-card">

    <div>

        <small>Companies</small>

        <h2 id="totalCompanies">

            0

        </h2>

    </div>

    <i class="fa-solid fa-building"></i>

</div>

<div class="stat-card">

    <div>

        <small>Storage</small>

        <h2 id="storageUsed">

            0 MB

        </h2>

    </div>

    <i class="fa-solid fa-database"></i>

</div>

</section>

<!-- =========================
     Quick Actions
========================= -->

<section class="quick-actions">

<button id="addProfileBtn">

    <i class="fa-solid fa-plus"></i>

    New Profile

</button>

<button id="importBtn">

    <i class="fa-solid fa-file-import"></i>

    Import

</button>

<button id="exportBtn">

    <i class="fa-solid fa-file-export"></i>

    Export

</button>

<button id="qrManagerBtn">

    <i class="fa-solid fa-qrcode"></i>

    QR Manager

</button>

</section>

<!-- ===== PART 2 STARTS BELOW THIS LINE ===== -->  <script>
    const supabase = createClient('https://oypgqdlypqpvbdhvvgaa.supabase.co/rest/v1/','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im95cGdxZGx5cHFwdmJkaHZ2Z2FhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0NDkwMzksImV4cCI6MjA5OTAyNTAzOX0.XBqbsgprrbxSwsg5w_cy_OIUPmTnKRXUw_ToWrEatb8'););

    // Check if logged in
    supabase.auth.getSession().then(({ data }) => {
      if (!data.session) window.location.href = 'admin.html';
    });

    async function loadProfiles() {
      const { data, error } = await supabase.from('profiles').select('*').order('name');
      if (error) return alert('Error loading');
      const container = document.getElementById('profilesList');
      container.innerHTML = data.map(p => `
        <div class="profile-card" data-id="${p.id}">
          <input value="${p.name || ''}" placeholder="Name" data-field="name" />
          <input value="${p.title || ''}" placeholder="Title" data-field="title" />
          <input value="${p.phone || ''}" placeholder="Phone" data-field="phone" />
          <input value="${p.email || ''}" placeholder="Email" data-field="email" />
          <input type="color" value="${p.theme_color || '#1a73e8'}" data-field="theme_color" />
          <div class="actions">
            <button class="save-btn" onclick="saveProfile('${p.id}')">💾 Save</button>
            <button class="delete-btn" onclick="deleteProfile('${p.id}')">🗑️</button>
            <a href="index.html?id=${p.id}" target="_blank" class="preview-link">👁️</a>
          </div>
        </div>
      `).join('');
    }

    async function saveProfile(id) {
      const card = document.querySelector(`.profile-card[data-id="${id}"]`);
      const updates = {};
      card.querySelectorAll('[data-field]').forEach(el => {
        updates[el.dataset.field] = el.value;
      });
      const { error } = await supabase.from('profiles').update(updates).eq('id', id);
      if (error) alert('Error saving: ' + error.message);
      else alert('✅ Saved!');
    }

    async function deleteProfile(id) {
      if (!confirm('Delete this profile?')) return;
      await supabase.from('profiles').delete().eq('id', id);
      loadProfiles();
    }

    async function addProfile() {
      const newId = prompt('Enter a unique ID (e.g., "john-doe"):');
      if (!newId) return;
      const { error } = await supabase.from('profiles').insert([{ id: newId, name: 'New User' }]);
      if (error) alert('Error: ' + error.message);
      else loadProfiles();
    }

    async function logout() {
      await supabase.auth.signOut();
      window.location.href = 'admin.html';
    }

    loadProfiles();
  </script>
</body>
</html>
